<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="OpenChat — a local-first ChatGPT alternative powered by OpenRouter.">
  <meta name="theme-color" content="#0D0D0F">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="OpenChat">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>OpenChat</title>
  <link rel="manifest" href="manifest.json">
</head>
<body style="background-color:#0D0D0F;">
  <style>
    #openchat-splash {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0D0D0F;
      transition: opacity 0.4s ease;
      z-index: 10;
    }
    #openchat-splash .spinner {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      border: 3px solid rgba(140, 92, 255, 0.25);
      border-top-color: #8C5CFF;
      animation: openchat-spin 0.9s linear infinite;
    }
    @keyframes openchat-spin { to { transform: rotate(360deg); } }
  </style>
  <div id="openchat-splash"><div class="spinner"></div></div>

  <script src="flutter_bootstrap.js" async></script>
  <script>
    function openchatHideSplash() {
      var splash = document.getElementById('openchat-splash');
      if (splash) {
        splash.style.opacity = '0';
        setTimeout(function () { splash.remove(); }, 450);
      }
    }
    window.addEventListener('flutter-first-frame', openchatHideSplash);
    // Safety net: never let the splash trap the user if the event is missed.
    setTimeout(openchatHideSplash, 8000);
  </script>
</body>
</html>
